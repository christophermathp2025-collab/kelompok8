<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orange and Blue Illustration | Project Presentation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        :root {
            --bg-color: #090B10;
            --container-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #FFFFFF;
            --text-secondary: #94A3B8;
            --gradient-start: #FF6B00;
            --gradient-end: #0077FF;
        }

        body {
            margin: 0;
            padding: 2rem;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 0%, rgba(255, 107, 0, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 100%, rgba(0, 119, 255, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            color: var(--text-primary);
        }

        /* Ambient Glow behind container */
        .ambient-glow {
            position: absolute;
            width: 60vw;
            height: 60vh;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.03) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: var(--container-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 1;
            animation: fadeIn 1s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.75rem);
            font-weight: 800;
            line-height: 1.2;
            margin: 0 0 0.8rem 0;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: slideDown 0.8s ease-out forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        .description {
            font-size: 1.25rem;
            color: var(--text-secondary);
            font-weight: 300;
            margin: 0;
            animation: slideDown 0.8s ease-out 0.2s forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        .presentation-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            /* 16:9 Aspect Ratio */
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            animation: scaleUp 1s ease-out 0.4s forwards;
            opacity: 0;
            transform: scale(0.95);
        }

        .presentation-wrapper:hover {
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7),
                0 0 40px rgba(0, 119, 255, 0.15),
                0 0 40px rgba(255, 107, 0, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .presentation-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .footer-note {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.95rem;
            color: var(--text-secondary);
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleUp {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>
    <div class="container">
        <header>
            <h1>KELOMPOK 8</h1>
            <p class="description">Group Project Presentation</p>
        </header>

        <div class="presentation-wrapper">
            <iframe loading="lazy" src="https://www.canva.com/design/DAHGFgFPT4U/vJT_pUHmRAN4O3oWB-JrJg/view?embed"
                allowfullscreen="allowfullscreen" allow="fullscreen" title="Canva Presentation"></iframe>
        </div>

        <div class="footer-note">
            Interact with the slides above to view the presentation.
        </div>
    </div>
</body>

</html>
